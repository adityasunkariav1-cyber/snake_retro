name: Build Nokia Snake

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run build.py (self-loads SQLite DB)
        run: python build.py

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: scores-db
          path: db/scores.db
